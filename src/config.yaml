data_load:
  dataset_csv: "data/Sleep_health_and_lifestyle_dataset.csv"
featurize:
  features_path: "data/df_clear.csv"
data_split:
  test_size: 0.3
  trainset_path: "data/train_sleep.csv"
  testset_path: "data/test_sleep.csv"
train:
  cv: 5
  model_type: "tree"
  alpha: [0.0001, 0.001, 0.01, 0.05, 0.5]
  n_estimators: [800]
  model_path: "models/sleep_disorder_model.joblib"
  power_path: "models/power.joblib"
  target_column: "Sleep Disorder"
test:
  model_path: "models/sleep_disorder_model.joblib"
  power_path: "models/power.joblib"
  testset_path: "data/test_sleep.csv"
